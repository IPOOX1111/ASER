version: '3.8'
services:

  nginx:
    image: nginx:stable
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
    networks:
      - voting-net

  app1:
    build: ./app
    container_name: app1
    environment:
      - FLASK_ENV=production
      - DB_PRIMARY_HOST=postgres-primary
      - DB_REPLICA_HOST=postgres-replica
      - POSTGRES_USER=voter
      - POSTGRES_PASSWORD=voterpass
      - POSTGRES_DB=votingdb
    networks:
      - voting-net

  app2:
    build: ./app
    container_name: app2
    environment:
      - FLASK_ENV=production
      - DB_PRIMARY_HOST=postgres-primary
      - DB_REPLICA_HOST=postgres-replica
      - POSTGRES_USER=voter
      - POSTGRES_PASSWORD=voterpass
      - POSTGRES_DB=votingdb
    networks:
      - voting-net

  postgres-primary:
    image: postgres:15
    container_name: postgres-primary
    environment:
      - POSTGRES_USER=voter
      - POSTGRES_PASSWORD=voterpass
      - POSTGRES_DB=votingdb
    volumes:
      - pgdata_primary:/var/lib/postgresql/data
      - ./db/initdb:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - voting-net

  postgres-replica:
    image: postgres:15
    container_name: postgres-replica
    environment:
      - POSTGRES_USER=voter
      - POSTGRES_PASSWORD=voterpass
      - POSTGRES_DB=votingdb
    volumes:
      - pgdata_replica:/var/lib/postgresql/data
      - ./db/replica:/replica-scripts
    command: ["bash", "/replica-scripts/entrypoint.sh"]
    depends_on:
      - postgres-primary
    networks:
      - voting-net

volumes:
  pgdata_primary:
  pgdata_replica:

networks:
  voting-net:
    driver: bridge
